audio:
  sample_rate: 16000
  channels: 1
  vad_mode: webrtc         # webrtc (recomendado) ou rms (fallback legado)
  vad_aggressiveness: 2    # 0-3: maior valor = detecção mais agressiva
  vad_frame_ms: 30         # frames suportados: 10, 20 ou 30 ms
  speech_threshold: 0.02   # usado apenas no modo rms (0.0–1.0)
  silence_duration: 0.8    # segundos de silencio para encerrar gravacao
  max_duration: 30.0       # limite maximo de gravacao em segundos

stt:
  model: small
  compute_type: int8
  language: pt
  beam_size: 1
  condition_on_previous_text: false

llm:
  provider: openrouter
  model: openai/gpt-4o-mini
  base_url: https://openrouter.ai/api/v1/chat/completions
  timeout: 15
  max_tokens: 48
  temperature: 0.2
  system_prompt: >
    Você é um assistente de voz chamado NAO.
    Responda sempre em português, de forma curta e direta, em no máximo duas frases.
    Nunca use emojis, markdown, listas ou formatação especial.
    Quando o usuário pedir para levantar, sentar, observar ou consultar a bateria, use a tool correspondente em vez de apenas descrever a ação.
    Após executar uma tool, responda com uma confirmação curta adequada para fala.

tts:
  engine: piper
  model_path: models/pt_BR-faber-medium.onnx
  voice: pt_BR
  sample_rate: 22050
  espeak_data: /usr/lib/x86_64-linux-gnu/espeak-ng-data
  piper_libs: /tmp/piper

# Network mode (used with --mode server / --mode client / --mode tcp-server)
network:
  host: 0.0.0.0          # server bind address
  port: 50007            # UDP port (--mode server / --mode client)
  tcp_port: 50007        # TCP port (--mode tcp-server / scripts/client.sh)
  server_host: 127.0.0.1 # client: IP of the processing machine (UDP client)
  streaming: false       # enable live UDP audio streaming on both client and server
  streaming_min_chunk_s: 0.6
  streaming_update_s: 0.3
  tcp_streaming: true
  tcp_streaming_min_chunk_s: 0.3
  tcp_streaming_update_s: 0.15
